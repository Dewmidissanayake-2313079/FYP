# Demographic-Aware Outfit Recommendation System - Configuration
# Standardized for Research Submission

paths:
  yolo_weights: "E:/4 year/IRP/FYP/runs/yolov8m_fashion5/weights/best.pt"
  gat_weights: "E:/4 year/IRP/FYP/ML models/gat_model_with_age.pt"
  dataset_path: "E:/4 year/IRP/FYP/Datasets/dataset_with_age_survey_based.csv"
  metadata_path: "E:/4 year/IRP/FYP/features/item_metadata.csv"
  clip_feat_path: "E:/4 year/IRP/FYP/features/clip_features.npy"
  image_dir: "E:/4 year/IRP/FYP/DeepFashion Dataset/images"
  crops_dir: "E:/4 year/IRP/FYP/features/crops"
  outfit_emb_path: "E:/4 year/IRP/FYP/ML models/gat_outfit_embeddings.npy"
  item_emb_path: "E:/4 year/IRP/FYP/ML models/gat_item_embeddings.npy"
  wears_edges_path: "E:/4 year/IRP/FYP/ML models/gat_wears_edges.npy"

model:
  hidden_dim: 128
  embed_dim: 64
  num_layers: 2
  num_heads: 4
  dropout: 0.3
  attn_dropout: 0.1

parameters:
  top_k: 10
  similar_count: 10
  complement_count: 3
  accessory_count: 4
  yolo_conf: 0.25
  clip_rerank_pool: 150

weights:
  similar:
    clip: 0.35
    gnn: 0.30
    demo: 0.25
    label: 0.10
  complementary:
    clip: 0.20
    gnn: 0.45
    demo: 0.25
    label: 0.10
  accessory:
    clip: 0.30
    gnn: 0.35
    demo: 0.25
    label: 0.10

